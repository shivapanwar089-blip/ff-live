<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>FF Live Overlay</title>

<link rel="stylesheet" href="css/overlay.css">

</head>
    
<body>

<!-- LEFT ELIMINATION FEED -->

<div id="elimFeed"></div>

<!-- NORMAL LEADERBOARD -->

<div id="leaderboard"></div>

<!-- FINAL 4 -->

<div id="final4"></div>
    
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";

import {
getDatabase,
ref,
onValue
}
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyA5oyJhPtLqfjZGkQ7aB4YYiBJymIhDghA",
authDomain: "fflive-792a5.firebaseapp.com",
databaseURL: "https://fflive-792a5-default-rtdb.firebaseio.com",
projectId: "fflive-792a5",
storageBucket: "fflive-792a5.firebasestorage.app",
messagingSenderId: "479680596017",
appId: "1:479680596017:web:99e9f7ef93bb9b27c32d10"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const elimFeed = document.getElementById("elimFeed");

const leaderboard = document.getElementById("leaderboard");

const final4 = document.getElementById("final4");

let eliminatedTeams = new Set();
    
function sticks(num){

let bars="";

for(let i=0;i<4;i++){

bars+= i<num ? "▮" : "□";

}

return bars;

}

function render(data){

let teams=Object.entries(data || {})
.map(([id,t])=>({id,...t}));

teams.sort((a,b)=>b.kills-a.kills);

const aliveTeams=teams.filter(t=>t.alive>0);

if(aliveTeams.length<=4 && aliveTeams.length>0){

leaderboard.style.display="none";
final4.style.display="flex";

// Win Probability
// Alive = 70%
// Kills = 30%

const totalScore = aliveTeams.reduce((sum, team) => {
    return sum + (team.kills * 0.3 + team.alive * 0.7);
}, 0);

aliveTeams.forEach(team => {

    const score = (team.kills * 0.3) + (team.alive * 0.7);

    const winPercent =
        totalScore === 0
        ? Math.round(100 / aliveTeams.length)
        : Math.round((score / totalScore) * 100);

    final4.innerHTML += `

<div class="final-card">

    <div class="card-top">

        <div class="team-left">

            <span class="rank">#${team.rank || ""}</span>

            <span class="team-name">${team.name}</span>

        </div>

        <div class="team-alive">

            ${"|".repeat(team.alive)}

        </div>

    </div>

    <div class="win-percent">

        Win ${winPercent}%

    </div>

</div>

`;

});

}
else{

leaderboard.style.display="flex";
final4.style.display="none";

leaderboard.innerHTML="";

teams.forEach((team,index)=>{

leaderboard.innerHTML+=`
<div class="team-row">

<div class="rank">
#${index+1}
</div>

<img
class="logo"
src="${team.logo}"
onerror="this.src='https://via.placeholder.com/40'"
>

<div class="name">
${team.name}
</div>

<div class="kills">
${team.kills}
</div>

<div class="alive">
${sticks(team.alive)}
</div>

</div>
`;

});

}

}

onValue(ref(db,"teams"),snapshot=>{
render(snapshot.val());
});

</script>

</body>
</html>
