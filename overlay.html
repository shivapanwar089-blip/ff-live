<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>FF Live Overlay</title>

<link rel="stylesheet" href="css/overlay.css">

</head>
    
<body>

<!-- LEFT ELIMINATION FEED -->

<div id="elimFeed"></div>

<!-- NORMAL LEADERBOARD -->

<div id="leaderboard"></div>

<!-- FINAL 4 -->

<div id="final4"></div>
    
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";

import {
getDatabase,
ref,
onValue
}
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyA5oyJhPtLqfjZGkQ7aB4YYiBJymIhDghA",
authDomain: "fflive-792a5.firebaseapp.com",
databaseURL: "https://fflive-792a5-default-rtdb.firebaseio.com",
projectId: "fflive-792a5",
storageBucket: "fflive-792a5.firebasestorage.app",
messagingSenderId: "479680596017",
appId: "1:479680596017:web:99e9f7ef93bb9b27c32d10"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const elimFeed = document.getElementById("elimFeed");

const leaderboard = document.getElementById("leaderboard");

const final4 = document.getElementById("final4");

let eliminatedTeams = new Set();
    
function finalBars(num){

let html="";

for(let i=0;i<4;i++){

if(i<num){

html += `<span class="alive-box alive"></span>`;

}
else{

html += `<span class="alive-box dead"></span>`;

}

}

return html;

}

function showElimination(team){

elimFeed.innerHTML += `

<div class="elim-card">

<div class="players">

<img src="assets/characters/default.png">

<img src="assets/characters/default.png">

<img src="assets/characters/default.png">

<img src="assets/characters/default.png">

</div>

<div class="elim-team">

${team.name}

</div>

<div class="elim-text">

ELIMINATED

</div>

</div>

`;

setTimeout(()=>{

if(elimFeed.firstElementChild){

elimFeed.removeChild(elimFeed.firstElementChild);

}

},5000);

}

function render(data){

let teams = Object.entries(data || {})
.map(([id,t])=>({id,...t}));

// Sort by Alive first, then Kills

teams.sort((a,b)=>{

if(a.alive!==b.alive){

return b.alive-a.alive;

}

return b.kills-a.kills;

});

const aliveTeams = teams.filter(t=>t.alive>0);

// ===================================================
// NORMAL LEADERBOARD
// ===================================================

if(aliveTeams.length>4){

leaderboard.style.display="flex";

final4.style.display="none";

leaderboard.innerHTML += `

<div class="team-row ${eliminated ? "eliminated" : ""}">

<div class="rank">
#${index+1}
</div>

<img
class="logo"
src="${team.logo}"
onerror="this.src='assets/logos/default.png'"
>

<div class="name">
${team.name}
</div>

<div class="kills">
${team.kills}
</div>

</div>

`;


// =======================================
// ELIMINATION FEED
// =======================================

if(eliminated && !eliminatedTeams.has(team.id)){

eliminatedTeams.add(team.id);

showElimination(team);

}

});

}

// ===================================================
// FINAL FOUR
// ===================================================

else{

leaderboard.style.display="none";

final4.style.display="flex";

final4.innerHTML="";

const totalScore = aliveTeams.reduce((sum,team)=>{

return sum+(team.alive*0.7+team.kills*0.3);

},0);

aliveTeams.forEach((team,index)=>{

const score=(team.alive*0.7)+(team.kills*0.3);

const win=Math.round(score/totalScore*100);

final4.innerHTML+=`

<div class="final-card">

<div class="card-top">

<div class="team-left">

<img

class="logo"

src="${team.logo}"

onerror="this.src='assets/logos/default.png'"

>

<div class="team-name">

#${index+1}

${team.name}

</div>

</div>

<div class="team-alive">
${sticks(team.alive)}
</div>

</div>

<div class="win-percent">

WIN ${win}%

</div>

</div>

`;

});

}

}
    
onValue(ref(db,"teams"),snapshot=>{
render(snapshot.val());
});

</script>

</body>
</html>
