<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FF LIVE ADMIN PANEL</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="container">

    <!-- ================= HEADER ================= -->

    <header>

        <h1>FREE FIRE LIVE ADMIN PANEL</h1>

        <div class="topBar">

            <div class="inputBox">

                <label>Tournament</label>

                <input
                    type="text"
                    id="tournamentName"
                    value="FF LIVE SCRIMS">

            </div>

            <div class="inputBox">

                <label>Match</label>

                <input
                    type="number"
                    id="matchNumber"
                    value="1">

            </div>

        </div>

    </header>

    <!-- ================= TEAM TABLE ================= -->

    <section class="tableSection">

        <table>

            <thead>

                <tr>

                    <th>Rank</th>

                    <th>Logo</th>

                    <th>Team Name</th>

                    <th>Kills</th>

                    <th>Alive</th>

                    <th>Delete</th>

                </tr>

            </thead>

            <tbody id="teamTable">

            </tbody>

        </table>

    </section>

    <!-- ================= BUTTONS ================= -->

    <div class="bottomButtons">

        <button id="addTeam">

            + ADD TEAM

        </button>

        <button id="resetMatch">

            RESET MATCH

        </button>

        <button id="finishMatch">

            FINISH MATCH

        </button>

    </div>

</div>

<!-- ================= SCRIPTS ================= -->

<script type="module" src="js/admin.js"></script>

</body>

</html>
