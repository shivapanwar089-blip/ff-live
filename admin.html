<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FF LIVE ADMIN PANEL</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="container">

<header>

<h1>FREE FIRE LIVE ADMIN PANEL</h1>

<div class="top-bar">

<div class="field">

<label>Tournament</label>

<input
id="tournamentName"
type="text"
value="FF LIVE SCRIMS">

</div>

<div class="field">

<label>Match</label>

<input
id="matchNumber"
type="number"
value="1">

</div>

</div>

</header>

<section class="tableSection">

<table>

<thead>

<tr>

<th>Rank</th>

<th>Logo</th>

<th>Team Name</th>

<th>Kills</th>

<th>Alive</th>

<th>Delete</th>

</tr>

</thead>

<tbody id="teamTable">

</tbody>

</table>

</section>

<div class="buttons">

<button id="addTeam">

+ ADD TEAM

</button>

<button id="resetMatch">

RESET MATCH

</button>

<button id="finishMatch">

FINISH MATCH

</button>

</div>

</div>

<script type="module" src="firebase.js"></script>

<script type="module" src="js/admin.js"></script>

</body>

</html>
